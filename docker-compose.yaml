x-airflow-common: &airflow-common
  image: apache/airflow:2.10.0

  env_file:
    - .env

  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/job_pipeline
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"

  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins

  depends_on:
    postgres:
      condition: service_healthy
  
services:

  postgres:
    image: postgres:16

    container_name: postgres

    restart: always

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - postgres-db-volume:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5

  airflow-init:
    <<: *airflow-common

    container_name: airflow-init

    command: >
      bash -c "
      airflow db migrate &&
      airflow users create \
      --username admin \
      --firstname Shubham \
      --lastname Patil \
      --role Admin \
      --email admin@example.com \
      --password admin
      "

  airflow-webserver:
    <<: *airflow-common

    container_name: airflow-webserver

    command: webserver

    ports:
      - "8080:8080"

    restart: always

  airflow-scheduler:
    <<: *airflow-common

    container_name: airflow-scheduler

    command: scheduler

    restart: always

volumes:

  postgres-db-volume: